name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so git describe/git log can see full history and tags

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v4

      - name: Configure BuildBuddy credentials
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
        run: |
          if [ -z "$BUILDBUDDY_API_KEY" ]; then
            echo "BUILDBUDDY_API_KEY secret is not set; using committed .buckconfig"
          else
            sed -i "s|^\(http_headers = x-buildbuddy-api-key:\).*|\1${BUILDBUDDY_API_KEY}|" .buckconfig
          fi

      - name: Build noctalia on BuildBuddy RBE
        run: |
          nix develop --command buck2 build //:noctalia

      - name: Stage release artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          # Find the built executable in buck-out.
          BINARY=$(find buck-out -name noctalia -type f -executable -print -quit)
          if [ -z "$BINARY" ]; then
            echo "Could not find built noctalia binary" >&2
            exit 1
          fi

          # Build a self-contained tarball: binary + all shared libraries.
          # The GitHub-hosted runner links against Nix store libs, so we bundle
          # the closure so the binary works on systems without those exact paths.
          mkdir -p dist/noctalia/lib

          # Collect dependencies from the original binary (which still has Nix
          # store RUNPATH) so ldd can resolve everything before we repatch it.
          collect_libs() {
            local bin=$1
            local seen_file=$2
            local needed
            needed=$(ldd "$bin" 2>/dev/null | awk '/=> \//{print $3}' | sort -u)
            for lib in $needed; do
              if [ -f "$lib" ] && ! grep -qx "$lib" "$seen_file" 2>/dev/null; then
                echo "$lib" >> "$seen_file"
                collect_libs "$lib" "$seen_file"
              fi
            done
          }
          collect_libs "$BINARY" /tmp/seen_libs.txt

          cp "$BINARY" dist/noctalia/noctalia
          chmod +x dist/noctalia/noctalia
          # Use the host system's standard dynamic linker so the release binary
          # runs on non-NixOS systems and uses the host glibc. The bundled libs
          # are found via $ORIGIN/lib.
          patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 dist/noctalia/noctalia
          patchelf --set-rpath '$ORIGIN/lib' dist/noctalia/noctalia
          # that already contains read-only library files.
          # glibc and the dynamic linker must come from the host system; bundling
          # a newer Nix glibc than the host loader supports causes ABI errors.
          EXCLUDE_LIBS="ld-linux-x86-64.so.2 libc.so.6 libm.so.6 libpthread.so.0 libdl.so.2 libresolv.so.2 librt.so.1 libutil.so.1 libnsl.so.1 libcrypt.so.1"
          while IFS= read -r lib; do
            name=$(basename "$lib")
            skip=false
            for ex in $EXCLUDE_LIBS; do
              if [ "$name" = "$ex" ]; then
                skip=true
                break
              fi
            done
            if [ "$skip" = false ]; then
              cp -L --remove-destination "$lib" dist/noctalia/lib/
            fi
          done < /tmp/seen_libs.txt

          # ldd resolves symlinks, but the dynamic linker looks for the SONAME.
          # Re-create SONAME symlinks so bundled libraries are found at runtime.
          for real in dist/noctalia/lib/*.so*; do
            if [ -f "$real" ] && [ ! -L "$real" ]; then
              soname=$(patchelf --print-soname "$real" 2>/dev/null)
              if [ -n "$soname" ] && [ "$soname" != "$(basename "$real")" ]; then
                ln -sf "$(basename "$real")" "dist/noctalia/lib/$soname"
              fi
            fi
          done
          dist/noctalia/noctalia --version

          # Include runtime assets so the extracted binary works without installation.
          cp -r assets dist/assets
          tar -czf dist/noctalia-x86_64-linux.tar.gz -C dist noctalia assets

          # Source tarball (without Nix/buck2 internals).
          mkdir -p ../noctalia-release
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='nix' \
            --exclude='flake.nix' \
            --exclude='flake.lock' \
            --exclude='result*' \
            --exclude='buck-out' \
            ./ ../noctalia-release/
          cd ..
          tar -czf noctalia-${{ github.ref_name }}.tar.gz noctalia-release/
          cp noctalia-${{ github.ref_name }}.tar.gz noctalia-latest.tar.gz
          mv *.tar.gz ${{ github.workspace }}/dist/

      - name: Generate release notes
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || true)
          if [ -z "${PREV_TAG:-}" ]; then
            PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          fi
          if [ -z "${PREV_TAG:-}" ]; then
            RANGE="$(git rev-list --max-parents=0 HEAD)..${GITHUB_REF_NAME}"
            SINCE_LABEL="project start"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
            SINCE_LABEL="${PREV_TAG}"
          fi
          echo "# Release ${GITHUB_REF_NAME}" > release_notes.md
          echo "" >> release_notes.md
          echo "## Changes since ${SINCE_LABEL}" >> release_notes.md
          echo "" >> release_notes.md
          git log ${RANGE} --pretty=format:"- %s ([%h](https://github.com/${GITHUB_REPOSITORY}/commit/%H)) by %an" >> release_notes.md
          echo "" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/noctalia-x86_64-linux.tar.gz
            dist/noctalia-${{ github.ref_name }}.tar.gz
            dist/noctalia-latest.tar.gz
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
